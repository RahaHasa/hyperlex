version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hyperlex-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - hyperlex-network

  # Опционально: MongoDB Express для управления БД через веб интерфейс
  mongo-express:
    image: mongo-express:latest
    container_name: hyperlex-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpassword@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - hyperlex-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  hyperlex-network:
    driver: bridge
